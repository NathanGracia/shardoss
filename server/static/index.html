<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shardoss</title>
  <link rel="icon" href="favicon.svg?v=1" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=14">
</head>
<body>
  <video class="page-wallpaper" src="wallpaper.mp4?v=1" autoplay muted loop playsinline></video>
  <div class="page-wallpaper-scrim"></div>
  <header>
    <div class="logo-group">
      <div class="logo-mark">
        <span class="h"></span>
        <span class="v"></span>
        <span class="ring"></span>
      </div>
      <div class="logo-text">
        <div class="logo">SHARDOSS</div>
        <div class="logo-tagline">COLLECTION · LIVE FEED</div>
      </div>
    </div>
    <div class="economy-bar" id="economy-bar"></div>
    <div class="meme-volume" id="meme-volume">
      <span class="meme-volume-icon" id="meme-volume-icon">🔊</span>
      <input type="range" class="meme-volume-slider" id="meme-volume-slider" min="0" max="1" step="0.01">
    </div>
    <div class="meme-volume" id="music-volume">
      <span class="meme-volume-icon" id="music-volume-icon">🎵</span>
      <input type="range" class="meme-volume-slider" id="music-volume-slider" min="0" max="1" step="0.01">
    </div>
    <div id="account-widget"></div>
  </header>

  <audio id="bg-music" preload="auto"></audio>

  <div class="filter-tabs" id="filter-tabs">
    <button class="filter-tab active" data-tier="all">TOUS</button>
    <button class="filter-tab" data-tier="common">COMMON</button>
    <button class="filter-tab" data-tier="rare">RARE</button>
    <button class="filter-tab" data-tier="epic">EPIC</button>
    <button class="filter-tab" data-tier="legendary">LEGENDARY</button>
    <span class="shards-held hf-mono" id="shards-held"></span>
  </div>

  <main>
    <div class="card-grid" id="card-grid">
      <div class="empty-state">Chargement…</div>
    </div>
  </main>

  <!-- Modal booster -->
  <div class="modal-overlay" id="booster-modal" hidden>
    <div class="modal-card modal-card--wide" id="booster-modal-card">
      <div class="modal-header">
        <div>
          <div class="modal-title hf-cond">BOOSTERS</div>
          <div class="modal-subtitle" id="booster-modal-subtitle">BOOSTERS DISPONIBLES</div>
        </div>
        <button class="modal-close" id="booster-modal-close">✕</button>
      </div>
      <div class="modal-body" id="booster-modal-body"></div>
      <div class="modal-footer">
        <button class="modal-ok" id="booster-modal-ok">TERMINER</button>
      </div>
    </div>
  </div>

  <!-- Modal notifications de tier -->
  <div class="modal-overlay" id="tier-modal" hidden>
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <div class="modal-title hf-cond">CHANGEMENTS DE TIER</div>
          <div class="modal-subtitle">MISE À JOUR QUOTIDIENNE</div>
        </div>
        <button class="modal-close" id="tier-modal-close">✕</button>
      </div>
      <div class="modal-body" id="tier-modal-body"></div>
      <div class="modal-footer">
        <button class="modal-ok" id="tier-modal-ok">OK</button>
      </div>
    </div>
  </div>

  <script src="account-widget.js?v=2"></script>
  <script src="app.js?v=19"></script>
</body>
</html>
