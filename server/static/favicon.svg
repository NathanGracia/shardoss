<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Tuile "blueprint" sombre : le favicon reprend la logo-mark de l'app
       (croix orange + anneau) mais sur fond ink pour rester lisible dans
       les onglets, clairs comme sombres. -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#10161c"/>
  <!-- Grille discrète, écho de la texture "blueprint" du fond du site -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.06">
    <line x1="0" y1="8" x2="32" y2="8"/>
    <line x1="0" y1="24" x2="32" y2="24"/>
    <line x1="8" y1="0" x2="8" y2="32"/>
    <line x1="24" y1="0" x2="24" y2="32"/>
  </g>
  <!-- Anneau (teal, visible sur fond sombre) -->
  <circle cx="16" cy="16" r="8.5" fill="none" stroke="#3fb6d3" stroke-width="1.5" opacity="0.85"/>
  <!-- Croix orange centrée -->
  <g stroke="#ff5a1f" stroke-width="1.6">
    <line x1="3" y1="16" x2="29" y2="16"/>
    <line x1="16" y1="3" x2="16" y2="29"/>
  </g>
  <!-- Éclat central (shard) -->
  <circle cx="16" cy="16" r="2" fill="#ff5a1f"/>
</svg>
