name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # nécessaire pour que Claude lise les résultats CI sur les PR
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Par défaut l'action ne donne accès qu'à Read/Grep/Glob + git
          # add/commit/push — pas moyen de réellement vérifier un changement
          # (lancer le serveur, valider un fichier, taper un endpoint).
          # Élargi en connaissance de cause : ce repo enchaîne déjà auto-merge
          # sans revue humaine + auto-deploy SSH sur le VPS en prod, donc ceci
          # ouvre de l'exécution de code arbitraire déclenchable par tout
          # commentaire d'issue contenant "@claude" — mitigé par la
          # vérification interne de l'action (n'agit que si l'auteur a un
          # accès en écriture au repo, voir "Verified human actor" dans les
          # logs de run), mais pas un vrai sandboxing. Choix explicite de
          # l'utilisateur, pas une valeur par défaut à copier ailleurs.
          # Pas de config.yaml en CI (jamais committé, contient des secrets)
          # — db.py dégrade proprement sur config vide, donc `python3 main.py`
          # démarre quand même (juste sans cooloss/Memoss fonctionnels).
          claude_args: |
            --allowedTools "Bash(python3:*),Bash(pip install:*),Bash(pip3 install:*),Bash(curl:*)"

      # Auto-merge, sans revue humaine — choix assumé pour ce repo perso à
      # faible enjeu (favicon, texte, petits correctifs). Claude ne merge
      # jamais lui-même (limitation documentée de l'action), donc c'est ce
      # step qui ouvre la PR et la merge dès qu'elle existe. Si le repo passe
      # un jour à des changements plus sensibles, remplacer ce step par une
      # simple notif ("PR prête, à toi de merger") plutôt que du full-auto.
      - name: Auto-merge Claude's branch
        if: steps.claude.outputs.branch_name != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.claude.outputs.branch_name }}
          PR_TITLE: ${{ github.event.issue.title || github.event.pull_request.title }}
          ISSUE_REF: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          set -e
          PR_NUMBER=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            gh pr create --head "$BRANCH" --base main \
              --title "Claude: ${PR_TITLE:-changement automatique}" \
              --body "Changement automatique par Claude Code, auto-mergé sans revue humaine (voir le run de l'action pour le détail). Réf #${ISSUE_REF}."
            PR_NUMBER=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number')
          fi
          gh pr merge "$PR_NUMBER" --squash --delete-branch

      # deploy.yml n'est PAS déclenché par ce merge : GitHub n'enchaîne pas
      # les workflows sur un commit créé via le GITHUB_TOKEN par défaut
      # (anti-boucle, comportement documenté — voir
      # https://docs.github.com/en/actions/concepts/security/github_token).
      # Plutôt que d'introduire un PAT juste pour contourner ça, le déploiement
      # est fait ici directement, dans le même job. Étape identique à
      # "Deploy via SSH" dans deploy.yml — dupliquée volontairement plutôt que
      # factorisée, pour ne pas complexifier deploy.yml (qui doit rester
      # déclenchable seul, pour un push humain direct ou un rerun manuel).
      - name: Deploy via SSH
        if: steps.claude.outputs.branch_name != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}

            echo "── Pull des dernières modifications ──"
            git pull origin main

            echo "── Rebuild et redémarrage Docker ──"
            cd server
            docker compose up -d --build --remove-orphans

            echo "── Nettoyage images inutilisées ──"
            docker image prune -f

            echo "── Healthcheck ──"
            sleep 5
            curl -sf http://localhost:8000/api/whoami > /dev/null \
              && echo "✓ Serveur opérationnel" \
              || (echo "✗ Healthcheck échoué" && docker compose logs --tail=30 && exit 1)
